<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Countdown Matrimonio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:transparent;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#3a3a3a;
}

.container{
    text-align:center;
}

h1{
    font-family:'Cormorant Garamond', serif;
    font-size:42px;
    font-weight:300;
    letter-spacing:1px;
    margin-bottom:25px;
    line-height:1.1;
}

#countdown{
    font-family:'Montserrat', sans-serif;
    font-size:48px;
    font-weight:300;
    letter-spacing:4px;
}

.small{
    margin-top:18px;
    font-family:'Montserrat', sans-serif;
    font-size:13px;
    font-weight:300;
    letter-spacing:3px;
    text-transform:uppercase;
    color:#8a8a8a;
}

</style>
</head>

<body>

<div class="container">
  <h1>Mancano </h1>
  <div id="countdown"></div>
  <div class="small">22 Aprile 2028</div>
</div>

<script>
const weddingDate = new Date("Apr 22, 2028 15:00:00").getTime();

const timer = setInterval(function() {

  const now = new Date().getTime();
  const distance = weddingDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    days + "g " + hours + "h " + minutes + "m " + seconds + "s";

  if (distance < 0) {
    clearInterval(timer);
    document.getElementById("countdown").innerHTML = "È il grande giorno ❤️";
  }

}, 1000);
</script>

</body>
</html>

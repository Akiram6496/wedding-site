<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Countdown Matrimonio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#3d3d3d;
}

.container{
    text-align:center;
    max-width:700px;
    width:100%;
    padding:40px;
}

/* FIORI */

.image-top{
    width:180px;
    margin:0 auto 30px auto;
    display:block;
}

.image-bottom{
    width:180px;
    margin:30px auto 0 auto;
    display:block;
}

/* DATA */

.date{
    font-family:'Cormorant Garamond', serif;
    font-size:48px;
    font-weight:300;
    letter-spacing:1px;
    margin-bottom:25px;
}

/* COUNTDOWN */

#countdown{
    font-family:'Montserrat', sans-serif;
    font-size:42px;
    font-weight:300;
    letter-spacing:4px;
    margin-bottom:20px;
}

/* NOMI */

.names{
    font-family:'Cormorant Garamond', serif;
    font-size:34px;
    font-weight:300;
    letter-spacing:1px;
}

/* ZAMPINA */

.paw{
    width:35px;
    margin:25px auto;
    display:block;
}

</style>
</head>

<body>

<div class="container">

    <img src="flower-top.png" class="flower-top" alt="Decorazione floreale">

    <div class="date">
        22 Aprile 2028
    </div>

    <div id="countdown"></div>

    <img src="zampetta_.png" class="paw" alt="Zampina">

    <div class="names">
        Marika & Daniele
    </div>

    <img src="flower-bottom.png" class="flower-bottom" alt="Decorazione floreale">

</div>

<script>

const weddingDate = new Date("Apr 22, 2028 15:00:00").getTime();

const timer = setInterval(function() {

    const now = new Date().getTime();
    const distance = weddingDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        days + "g  " +
        hours + "h  " +
        minutes + "m  " +
        seconds + "s";

    if (distance < 0) {
        clearInterval(timer);
        document.getElementById("countdown").innerHTML =
        "È il grande giorno ❤️";
    }

}, 1000);

</script>

</body>
</html>
